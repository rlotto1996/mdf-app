name: Build Android APK

on:
  push:
    branches: [ main, claude/** ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Instalar dependências do sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config \
          cmake \
          libffi-dev libssl-dev \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          libjpeg-dev libpng-dev libfreetype6-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev \
          gettext autopoint \
          build-essential \
          python3-dev

    - name: Instalar Buildozer e Cython
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython==3.0.10

    - name: Injetar API keys via variáveis de ambiente
      run: |
        sed -i "s|os.environ.get(\"BINANCE_API_KEY\", \"\")|\"${{ secrets.BINANCE_API_KEY }}\"|g" fetcher_core.py
        sed -i "s|os.environ.get(\"COINALYZE_API_KEY\", \"\")|\"${{ secrets.COINALYZE_API_KEY }}\"|g" fetcher_core.py
        sed -i "s|os.environ.get(\"TWELVEDATA_API_KEY\", \"\")|\"${{ secrets.TWELVEDATA_API_KEY }}\"|g" fetcher_core.py

    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.gradle
        key: buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: buildozer-

    - name: Compilar APK
      run: |
        buildozer android debug 2>&1 | tee buildozer.log

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MarketDataFetcher-APK
        path: bin/*.apk
        retention-days: 30

    - name: Upload log de build (em caso de falha)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 7
